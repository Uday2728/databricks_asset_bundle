# The main pipeline for databricks_asset_bundle

resources:
  pipelines:
    bronze_to_silver_earthquake_etl:
      name: bronze_to_silver
      configuration:
        catalog_name: ${var.catalog}
      libraries:
        - glob:
            include: ../src/DLT_pipelines/bronze_silver/transformations/**
      schema: silver
      continuous: false
      development: false
      photon: true
      channel: CURRENT
      catalog: ${var.catalog}
      serverless: true
      root_path: ../src/DLT_pipelines/bronze_silver
