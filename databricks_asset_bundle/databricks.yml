# This is a Databricks asset bundle definition for databricks_asset_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databricks_asset_bundle
  uuid: f644c37d-8d7d-455b-a395-bcfc09b3d610

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-998e00a2-079c.cloud.databricks.com
    variables:
      catalog: databricks_as
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-998e00a2-079c.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/udayyempuluru99@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/prod_databricks_as/databricks_asset_bundle
    variables:
      catalog: databricks_as_prod
      schema: prod
    permissions:
      - user_name: udayyempuluru99@gmail.com
        level: CAN_MANAGE
